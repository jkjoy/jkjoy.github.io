<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKJOY</title>
    <meta name="description" content="JKJOY 的个人主页，收录博客、GitHub、Telegram、X 和邮箱等联系方式。">
    <meta name="author" content="JKJOY">
    <meta property="og:title" content="JKJOY">
    <meta property="og:description" content="JKJOY 的个人主页与联系方式。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jkjoy.de/">
    <meta property="og:image" content="https://cn.cravatar.com/avatar/14361cbdd724071a19e158bdf0aa8841?s=250">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-1: #eef7ff;
            --bg-2: #dbeafe;
            --card-bg: rgba(255, 255, 255, 0.78);
            --card-border: rgba(255, 255, 255, 0.55);
            --text: #0f172a;
            --muted: #64748b;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --shadow: 0 12px 36px rgba(37, 99, 235, 0.12);
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
        }

        .card {
            width: 100%;
            max-width: 520px;
            padding: 48px 40px;
            text-align: center;
            border-radius: 24px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .avatar-link {
            display: inline-block;
            width: 112px;
            height: 112px;
            margin-bottom: 20px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, #60a5fa 0%, #2563eb 100%);
            transition: transform 0.25s ease;
        }

        .avatar-link:hover {
            transform: translateY(-2px);
        }

        .avatar-link img {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.9);
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--primary);
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 18px;
        }

        .bio {
            max-width: 34ch;
            margin: 0 auto 14px;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.8;
        }

        .memo {
            max-width: 34ch;
            margin: 0 auto 26px;
        }

        .memo-content {
            color: var(--text);
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .memo-meta {
            margin-top: 6px;
            color: var(--muted);
            font-size: 12px;
        }

        .memo.is-loading .memo-content,
        .memo.is-error .memo-content {
            color: var(--muted);
        }

        .links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.82);
            color: var(--primary);
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.85);
            box-shadow: 0 6px 18px rgba(37, 99, 235, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease, color 0.2s ease;
        }

        .link:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 22px rgba(37, 99, 235, 0.14);
            color: var(--primary-dark);
        }

        .link svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid rgba(148, 163, 184, 0.18);
            color: var(--muted);
            font-size: 14px;
        }

        .footer svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
            fill: currentColor;
        }

        .avatar-link:focus-visible,
        .link:focus-visible {
            outline: 3px solid rgba(37, 99, 235, 0.25);
            outline-offset: 3px;
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            .card {
                padding: 36px 24px;
                border-radius: 20px;
            }

            h1 {
                font-size: 28px;
            }

            .bio,
            .memo-content {
                font-size: 14px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <a class="avatar-link" href="https://www.imsun.org" target="_blank" rel="noopener noreferrer" aria-label="访问博客">
            <img src="https://cn.cravatar.com/avatar/14361cbdd724071a19e158bdf0aa8841?s=250" alt="JKJOY 的头像">
        </a>

        <h1>JKJOY</h1>
        <p class="subtitle">Digital Nomad / Creator</p>
        <p class="bio">I'm a guy and into girls.</p>

        <section class="memo is-loading" id="latest-memo" aria-live="polite">
            <p class="memo-content" id="memo-content">加载最新说说中...</p>
            <p class="memo-meta" id="memo-meta"></p>
        </section>

        <nav class="links" aria-label="社交链接">
            <a href="https://github.com/jkjoy" target="_blank" rel="noopener noreferrer" class="link" title="GitHub" aria-label="GitHub">
                <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.39.6.11.8-.26.8-.58v-2.17c-3.34.73-4.03-1.42-4.03-1.42-.55-1.39-1.34-1.76-1.34-1.76-1.09-.74.09-.72.09-.72 1.2.08 1.83 1.23 1.83 1.23 1.07 1.83 2.81 1.3 3.49 1 .11-.78.42-1.31.76-1.61-2.66-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.11-3.18 0 0 1.01-.32 3.3 1.23A11.5 11.5 0 0 1 12 5.8c1.02.01 2.05.14 3 .4 2.29-1.55 3.3-1.23 3.3-1.23.65 1.65.24 2.87.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.81 5.62-5.48 5.92.43.37.82 1.1.82 2.22v3.29c0 .32.19.69.8.57C20.57 21.8 24 17.3 24 12 24 5.37 18.63 0 12 0z"/></svg>
            </a>
            <a href="https://x.com/imsunorg" target="_blank" rel="noopener noreferrer" class="link" title="X" aria-label="X">
                <svg viewBox="0 0 24 24"><path d="M18.9 2H22l-6.77 7.74L23.2 22h-6.26l-4.9-7.38L5.58 22H2.46l7.24-8.27L1 2h6.42l4.43 6.8L18.9 2zm-1.1 18h1.73L6.48 3.9H4.62L17.8 20z"/></svg>
            </a>
            <a href="https://t.me/imsunpw" target="_blank" rel="noopener noreferrer" class="link" title="Telegram" aria-label="Telegram">
                <svg viewBox="0 0 24 24"><path d="M9.04 15.47 8.7 20.3c.49 0 .7-.21.95-.46l2.28-2.18 4.73 3.46c.87.48 1.48.23 1.72-.81l3.11-14.57h0c.29-1.36-.49-1.89-1.33-1.58L1.89 11.2c-1.31.51-1.29 1.24-.22 1.57l4.67 1.46L17.2 7.39c.51-.34.98-.15.6.19"/></svg>
            </a>
            <a href="mailto:admin@ssk.im" class="link" title="Email" aria-label="Email">
                <svg viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4.24-8 5.34-8-5.34V6l8 5.33L20 6v2.24z"/></svg>
            </a>
        </nav>

        <div class="footer">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            GUANGDONG, CHINA
        </div>
    </main>

    <script>
        (async function () {
            const memoCard = document.getElementById('latest-memo');
            const memoContent = document.getElementById('memo-content');
            const memoMeta = document.getElementById('memo-meta');

            try {
                const response = await fetch('https://www.imsun.org/api/v1/memos', {
                    headers: {
                        Accept: 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error('Request failed');
                }

                const memos = await response.json();

                if (!Array.isArray(memos) || memos.length === 0) {
                    throw new Error('Empty memo list');
                }

                const latestMemo = memos
                    .filter(function (item) {
                        return item && item.status === 'public' && item.content;
                    })
                    .sort(function (left, right) {
                        return new Date(right.time.replace(' ', 'T')) - new Date(left.time.replace(' ', 'T'));
                    })[0];

                if (!latestMemo) {
                    throw new Error('No public memo');
                }

                memoContent.textContent = latestMemo.content;
                memoMeta.textContent = latestMemo.time || '';
                memoCard.classList.remove('is-loading', 'is-error');
            } catch (error) {
                memoContent.textContent = '暂时获取不到最新说说。';
                memoMeta.textContent = '';
                memoCard.classList.remove('is-loading');
                memoCard.classList.add('is-error');
            }
        })();
    </script>
</body>
</html>
